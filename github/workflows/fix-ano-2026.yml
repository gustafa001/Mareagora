
name: Fix Ano 2025 para 2026

on:
  workflow_dispatch:

jobs:
  fix-ano:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Corrigir ano nos JSONs
        run: |
          python3 << 'EOF'
          import os

          data_dir = "data"
          total = 0

          for filename in os.listdir(data_dir):
              if not filename.endswith(".json"):
                  continue

              filepath = os.path.join(data_dir, filename)

              with open(filepath, "r", encoding="utf-8") as f:
                  content = f.read()

              if '"ano": 2025' not in content and '"2025-' not in content:
                  continue

              new_content = content.replace('"ano": 2025', '"ano": 2026')
              new_content = new_content.replace('"2025-', '"2026-')

              with open(filepath, "w", encoding="utf-8") as f:
                  f.write(new_content)

              print(f"Corrigido: {filename}")
              total += 1

          print(f"\nTotal de arquivos corrigidos: {total}")
          EOF

      - name: Commit e push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "fix: atualiza ano 2025 para 2026 nos JSONs de maré"
          git push
