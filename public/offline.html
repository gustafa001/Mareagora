<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MaréAgora — Offline</title>
    <style>
        body {
            background-color: #0f172a;
            color: white;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            padding: 20px;
        }
        .icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        p {
            color: #94a3b8;
            margin-bottom: 30px;
        }
        button {
            background: linear-gradient(to right, #2563eb, #06b6d4);
            border: none;
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="icon">🌊</div>
    <h1>Você está offline</h1>
    <p>Parece que você não tem conexão com a internet no momento. Tente novamente quando estiver online.</p>
    <button onclick="window.location.reload()">Tentar Novamente</button>
</body>
</html>
